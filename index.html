<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>샤오홍슈 트래커 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --red:#ff2442; --red-soft:#fff0f2; --ink:#1a1a1e; --muted:#6b6b76;
    --line:#ececf0; --bg:#f6f6f8; --card:#ffffff; --good:#12b76a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,"Malgun Gothic","맑은 고딕",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:32px 24px 64px}
  header.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:40px;height:40px;border-radius:11px;background:var(--red);color:#fff;
    display:grid;place-items:center;font-weight:800;font-size:20px}
  h1{font-size:22px;letter-spacing:-.3px}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .refresh-btn{background:var(--red);color:#fff;border:none;border-radius:10px;
    padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
  .refresh-btn:hover{opacity:.88}
  .refresh-btn:disabled{opacity:.5;cursor:default}
  .toast{display:none;margin:14px 0 0;padding:11px 16px;border-radius:10px;font-size:13px}
  .toast.show{display:block}
  .toast.info{background:#eef4ff;border:1px solid #c7dbff;color:#2b4f9e}
  .toast.ok{background:#e9f9f0;border:1px solid #b6ebcd;color:#0a7d47}
  .toast.err{background:#fdecec;border:1px solid #f5c2c2;color:#a32222}
  .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;
    letter-spacing:.6px;margin:34px 0 14px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
  .kpi .label{font-size:12px;color:var(--muted);font-weight:600}
  .kpi .val{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-top:6px}
  /* table */
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);
    border-radius:14px;overflow:hidden}
  th,td{text-align:left;padding:12px 14px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{background:#fafafb;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  th.sortable{cursor:pointer;user-select:none;white-space:nowrap;transition:color .12s}
  th.sortable:hover{color:var(--ink)}
  .sort-ind{opacity:.3;font-size:10px;margin-left:3px}
  .sort-ind.on{opacity:1;color:var(--red)}
  .crow{cursor:pointer;transition:background .12s}
  .crow:hover{background:#fafafe}
  .chev{display:inline-block;width:16px;color:var(--muted);transition:transform .15s}
  .crow.open .chev{transform:rotate(90deg);color:var(--red)}
  .cname{font-weight:700}
  a.cnamelink{color:var(--ink);text-decoration:none;border-bottom:1px solid transparent;transition:color .12s,border-color .12s}
  a.cnamelink:hover{color:var(--red);border-bottom-color:var(--red)}
  a.cnamelink::after{content:'↗';font-size:9px;color:var(--muted);margin-left:4px;vertical-align:2px;opacity:.6}
  .cnum{font-weight:700;font-variant-numeric:tabular-nums}
  .up{color:var(--good);font-size:11px;font-weight:600;margin-left:6px}
  .flat{color:var(--muted);font-size:11px;margin-left:6px}
  .recent{max-width:260px;color:var(--ink)}
  .recent .rt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{display:inline-block;background:var(--red-soft);color:var(--red);font-size:10px;
    font-weight:700;padding:2px 7px;border-radius:20px;margin-right:6px;vertical-align:1px}
  .pbadge{display:inline-block;background:#e9f9f0;color:#0a7d47;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:1px}
  .npbadge{display:inline-block;background:#f1f1f4;color:#8a8a94;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:1px}
  .filterbar{display:flex;gap:8px;margin:0 0 12px;align-items:center}
  .fbtn{background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
  .fbtn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .fcount{font-size:12px;color:var(--muted);margin-left:auto}
  .detail-row td{background:#fbfbfd;padding:0}
  .detail-inner{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.1fr);gap:20px;padding:18px 20px}
  .chart-box{height:200px}
  .mini-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px}
  .ntable{border:1px solid var(--line);border-radius:10px}
  .ntable th,.ntable td{padding:8px 12px;font-size:12px}
  .nlink{color:var(--ink);text-decoration:none;border-bottom:1px solid transparent;transition:color .12s,border-color .12s}
  .nlink:hover{color:var(--red);border-bottom-color:var(--red)}
  .nlink::after{content:'↗';font-size:9px;color:var(--muted);margin-left:4px;vertical-align:2px;opacity:.6}
  .empty{text-align:center;color:var(--muted);padding:40px;font-size:14px}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}.detail-inner{grid-template-columns:1fr}}
</style>
</head>
<body>
<script src="data.js"></script>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">书</div>
      <div>
        <h1>샤오홍슈 트래커</h1>
        <div class="sub" id="updated">불러오는 중…</div>
      </div>
    </div>
    <button id="refreshBtn" class="refresh-btn">↻ 갱신</button>
  </header>
  <div id="toast" class="toast"></div>

  <div class="section-title">전체 요약</div>
  <div class="kpis" id="kpis"></div>

  <div class="section-title">크리에이터 계정 · 헤더를 클릭하면 정렬 · 행을 클릭하면 그래프·게시물 추이가 펼쳐집니다</div>
  <div class="filterbar" id="filterbar">
    <button class="fbtn active" data-f="all">전체</button>
    <button class="fbtn" data-f="1">계약</button>
    <button class="fbtn" data-f="0">미계약</button>
    <span class="fcount" id="fcount"></span>
  </div>
  <div id="creatorArea"></div>
</div>

<script>
/* ===== 갱신 버튼 ===== */
const servedOverHttp = location.protocol.startsWith('http');
const btn = document.getElementById('refreshBtn');
const toast = document.getElementById('toast');
function showToast(msg,type){toast.className='toast show '+type;toast.textContent=msg;}
btn.addEventListener('click', async ()=>{
  if(!servedOverHttp){
    showToast('갱신 버튼은 run.bat 으로 실행(localhost)했을 때만 동작합니다.','err'); return;
  }
  btn.disabled=true; const old=btn.textContent; btn.textContent='수집 중…';
  showToast('데이터를 다시 수집하는 중입니다. (1~2분 소요)','info');
  try{
    const r=await fetch('/refresh',{cache:'no-store'});
    const j=await r.json();
    if(j.ok){ showToast('수집 완료! 새로고침합니다…','ok'); setTimeout(()=>location.reload(),900); }
    else { showToast('수집 실패: '+(j.log||'원인 불명').split('\n').slice(-3).join(' '),'err');
      btn.disabled=false; btn.textContent=old; }
  }catch(e){ showToast('서버 연결 실패. run.bat 창이 켜져 있는지 확인하세요.','err');
    btn.disabled=false; btn.textContent=old; }
});

/* ===== 데이터 ===== */
const D = window.XHS_DATA || {notes:[],profiles:[]};
const notes = D.notes||[], profiles = D.profiles||[];
const fmt = n => (n>=10000)? (n/10000).toFixed(1).replace(/\.0$/,'')+'만' : (n||0).toLocaleString('ko-KR');
const first = h => (h&&h.length)? h[0] : null;
const last  = h => (h&&h.length)? h[h.length-1] : null;

document.getElementById('updated').textContent = '마지막 업데이트: ' + (D.updated_at||'-');

/* 크리에이터별 노트 묶기 */
function notesOf(p){
  const g = notes.filter(n=>n.author && p.name && n.author===p.name);
  g.sort((a,b)=>(a.grid_order??999)-(b.grid_order??999));
  return g;
}
function recentOf(g){  // 업로드 날짜가 있으면 최신일자, 없으면 고정 제외 최상단
  const wd = g.filter(n=>n.publish_time);
  if(wd.length) return [...wd].sort((a,b)=> a.publish_time<b.publish_time?1:-1)[0];
  return g.find(n=>!n.pinned) || g[0] || null;
}
function fansDelta(p){
  const f=first(p.history), l=last(p.history);
  if(!f||!l||f.fans==null) return '';
  const d=l.fans-f.fans;
  if(d>0) return `<span class="up">▲ +${fmt(d)}</span>`;
  if(d<0) return `<span class="flat">▼ ${fmt(-d)}</span>`;
  return '';
}

/* KPI */
const sum=(arr,k)=>arr.reduce((a,b)=>a+(b[k]||0),0);
const kpis=[
  {label:'추적 크리에이터', val:profiles.length},
  {label:'총 팔로워', val:fmt(sum(profiles,'fans'))},
  {label:'총 좋아요·저장', val:fmt(sum(profiles,'likes_collects'))},
  {label:'추적 게시물', val:notes.length},
];
document.getElementById('kpis').innerHTML = kpis.map(k=>
  `<div class="kpi"><div class="label">${k.label}</div><div class="val">${k.val}</div></div>`).join('');

/* ===== 크리에이터 테이블 (정렬·필터·펼치기) ===== */
const area=document.getElementById('creatorArea');

// 각 크리에이터의 정렬용 뷰모델 (원래 index 유지 → 차트/디테일 id 안정)
const VM = profiles.map((p,idx)=>{
  const g=notesOf(p); const rec=recentOf(g);
  return { idx, p, g, rec,
    name:(p.name||''),
    fans:(p.fans||0),
    lc:(p.likes_collects||0),
    ncount:(g.length||p.notes_count||0),
    recent:((rec&&rec.publish_time)||'') };
});

const drawn={};
let sortKey=null, sortDir=-1, curFilter='all';
const DEF_DIR={name:1, recent:-1, fans:-1, lc:-1, ncount:-1}; // 이름=오름차순, 나머지=내림차순 먼저

function sortInd(key){
  if(sortKey!==key) return '<span class="sort-ind">↕</span>';
  return sortDir>0 ? '<span class="sort-ind on">▲</span>' : '<span class="sort-ind on">▼</span>';
}

function rowHtml(vm){
  const {idx,p,g,rec}=vm; const pf=p.partner?1:0;
  const nm = p.name||'(이름 없음)';
  const nameHtml = p.url
    ? `<a class="cname cnamelink" href="${p.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${nm}</a>`
    : `<span class="cname">${nm}</span>`;
  return `<tr class="crow" data-idx="${idx}" data-partner="${pf}">
      <td><span class="chev">▶</span></td>
      <td>${nameHtml}${p.partner?'<span class="pbadge">계약</span>':'<span class="npbadge">미계약</span>'}${fansDelta(p)}</td>
      <td class="num cnum">${fmt(p.fans)}</td>
      <td class="num cnum">${fmt(p.likes_collects)}</td>
      <td class="num cnum">${g.length||p.notes_count||0}</td>
      <td class="recent"><div class="rt">${rec? (rec.title||'-') : '-'}</div>
        ${rec&&rec.publish_time? `<div style="font-size:11px;color:var(--muted)">${rec.publish_time}</div>`:''}</td>
    </tr>
    <tr class="detail-row" id="detail-${idx}" data-partner="${pf}" style="display:none"><td colspan="6">
      <div class="detail-inner">
        <div>
          <div class="mini-title">팔로워 · 좋아요·저장 추이</div>
          <div class="chart-box"><canvas id="chart-${idx}"></canvas></div>
        </div>
        <div>
          <div class="mini-title">게시물 추이 (업로드 최신순)</div>
          ${g.length? notesTable(g) : '<div class="empty" style="padding:20px">수집된 게시물이 없습니다.</div>'}
        </div>
      </div>
    </td></tr>`;
}

function renderTable(){
  if(!profiles.length){
    area.innerHTML='<div class="empty">추적 중인 크리에이터가 없습니다. links.txt 에 프로필 링크를 넣고 갱신하세요.</div>';
    return;
  }
  // 필터
  let list = VM.filter(vm => curFilter==='all' ? true : (vm.p.partner?1:0)===Number(curFilter));
  // 정렬
  if(sortKey){
    list = [...list].sort((a,b)=>{
      let c;
      if(sortKey==='name'||sortKey==='recent') c = String(a[sortKey]).localeCompare(String(b[sortKey]),'ko');
      else c = (a[sortKey]||0) - (b[sortKey]||0);
      return c * sortDir;
    });
  }
  const thead = `<tr>
    <th style="width:28px"></th>
    <th class="sortable" data-sort="name">크리에이터 ${sortInd('name')}</th>
    <th class="num sortable" data-sort="fans">팔로워 ${sortInd('fans')}</th>
    <th class="num sortable" data-sort="lc">좋아요·저장 ${sortInd('lc')}</th>
    <th class="num sortable" data-sort="ncount">노트 ${sortInd('ncount')}</th>
    <th class="sortable" data-sort="recent">최근 게시물 ${sortInd('recent')}</th>
  </tr>`;
  area.innerHTML = `<table><thead>${thead}</thead><tbody>${list.map(rowHtml).join('')}</tbody></table>`;
  bindRows();
  bindHeaders();
}

/* 행 클릭 → 펼치기 + 그래프 지연 렌더 */
function bindRows(){
  area.querySelectorAll('.crow').forEach(row=>{
    row.addEventListener('click',()=>{
      const idx=row.dataset.idx;
      const det=document.getElementById('detail-'+idx);
      const open=det.style.display!=='none';
      det.style.display=open?'none':'';
      row.classList.toggle('open',!open);
      if(!open && !drawn[idx]){ drawn[idx]=true; drawChart(idx); }
    });
  });
}

/* 헤더 클릭 → 정렬 토글(오름/내림) */
function bindHeaders(){
  area.querySelectorAll('th.sortable').forEach(th=>{
    th.addEventListener('click',()=>{
      const k=th.dataset.sort;
      if(sortKey===k) sortDir=-sortDir;          // 같은 컬럼 재클릭 → 방향 뒤집기
      else { sortKey=k; sortDir=DEF_DIR[k]||-1; } // 새 컬럼 → 기본 방향
      renderTable();
    });
  });
}

/* 계약/미계약 필터 */
(function(){
  const pc = profiles.filter(p=>p.partner).length;
  const fc = document.getElementById('fcount');
  if(fc) fc.textContent = `계약 ${pc} · 미계약 ${profiles.length-pc}`;
  document.querySelectorAll('#filterbar .fbtn').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('#filterbar .fbtn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      curFilter=b.dataset.f;
      renderTable();
    });
  });
})();

function notesTable(g){
  const rec=recentOf(g);
  // 업로드 최신순 정렬 (날짜 있는 것 먼저, 최신이 위 / 날짜 없으면 grid_order 순으로 맨 뒤)
  const sorted=[...g].sort((a,b)=>{
    const da=a.publish_time||'', db=b.publish_time||'';
    if(da&&db) return da<db?1:(da>db?-1:0);
    if(da&&!db) return -1;
    if(!da&&db) return 1;
    return (a.grid_order??999)-(b.grid_order??999);
  });
  let r=`<table class="ntable"><thead><tr><th>제목</th><th>업로드</th>
    <th class="num">좋아요</th><th class="num">저장</th><th class="num">댓글</th><th class="num">공유</th></tr></thead><tbody>`;
  sorted.forEach(n=>{
    const tag = (n===rec)? '<span class="badge">최근</span>' : (n.pinned? '<span class="badge">고정</span>':'');
    const t = n.title||'-';
    const titleCell = n.url ? `<a class="nlink" href="${n.url}" target="_blank" rel="noopener">${t}</a>` : t;
    r+=`<tr><td>${tag}${titleCell}</td><td style="color:var(--muted)">${n.publish_time||'-'}</td>
      <td class="num cnum">${fmt(n.likes)}</td><td class="num cnum">${fmt(n.collects)}</td>
      <td class="num cnum">${fmt(n.comments)}</td><td class="num cnum">${fmt(n.shares)}</td></tr>`;
  });
  return r+`</tbody></table>`;
}

function drawChart(idx){
  const p=profiles[idx]; const h=p.history||[];
  const ctx=document.getElementById('chart-'+idx); if(!ctx) return;
  if(h.length<1) return;
  new Chart(ctx,{
    type:'line',
    data:{labels:h.map(x=>x.date),datasets:[
      {label:'팔로워',data:h.map(x=>x.fans),borderColor:'#ff2442',backgroundColor:'#ff244222',tension:.35,fill:true,borderWidth:2,pointRadius:3,yAxisID:'y'},
      {label:'좋아요·저장',data:h.map(x=>x.likes_collects),borderColor:'#7a5cff',backgroundColor:'#7a5cff22',tension:.35,fill:true,borderWidth:2,pointRadius:3,yAxisID:'y'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{boxWidth:10,font:{size:11}}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10}}},
        y:{grid:{color:'#f0f0f3'},ticks:{font:{size:10},callback:v=>fmt(v)}}}}
  });
}

/* 최초 렌더 */
renderTable();
</script>
</body>
</html>
